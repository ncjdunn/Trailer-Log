<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Media Viewer</title>
  <meta name="theme-color" content="#4169E1">
  <style>
    :root{
      --bg:#0f172a;
      --panel:rgba(15,23,42,0.92);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,0.12);
      --primary:#4169E1;
      --primary-2:#2747B0;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
    body{display:flex;flex-direction:column}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;
      position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line);background:var(--panel);backdrop-filter:blur(8px)
    }
    .title{font-size:1rem;font-weight:700}
    .note{padding:12px 14px;color:var(--muted);line-height:1.45}
    .viewer{flex:1;display:flex;align-items:center;justify-content:center;padding:12px}
    .topbar-actions{display:flex;align-items:center;gap:10px}
    .viewer img,.viewer video{
      max-width:100%;max-height:calc(100vh - 120px);width:auto;height:auto;border-radius:14px;background:#000;
      box-shadow:0 20px 50px rgba(0,0,0,0.45);transition:transform .18s ease
    }
    .viewer img.quarter-turn{
      max-width:calc(100vh - 120px);
      max-height:calc(100vw - 24px);
    }
    @media (orientation: landscape){
      .viewer img.quarter-turn{
        max-width:calc(100vw - 24px);
        max-height:calc(100vh - 120px);
      }
    }
    .empty{padding:24px;text-align:center;color:var(--muted)}
    button{
      padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:linear-gradient(180deg,var(--primary),var(--primary-2));
      color:#fff;font:inherit;font-weight:700;cursor:pointer
    }
    .secondary{background:transparent}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Media Viewer</div>
    <div class="topbar-actions">
      <button type="button" id="rotateBtn">Rotate</button>
      <button type="button" class="secondary" id="backBtn">Back</button>
    </div>
  </div>
  <div id="note" class="note" hidden></div>
  <main class="viewer" id="viewer">
    <div class="empty">Loading media…</div>
  </main>

  <script>
    (function () {
      const DB_NAME = 'TrailerWeightLoggerDB';
      const DB_VERSION = 2;
      const MEDIA_STORE = 'media';
      const viewer = document.getElementById('viewer');
      const noteEl = document.getElementById('note');
      const titleEl = document.querySelector('.title');
      const rotateBtn = document.getElementById('rotateBtn');
      const backBtn = document.getElementById('backBtn');

      let currentMediaNode = null;
      let currentMediaId = null;
      let currentTempKey = null;
      let currentMediaRecord = null;
      let currentRotation = 0;

      function normalizeRotation(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return 0;
        return ((n % 360) + 360) % 360;
      }

      function getMediaId() {
        return new URLSearchParams(window.location.search).get('mediaId');
      }

      function getTempKey() {
        return new URLSearchParams(window.location.search).get('tempKey');
      }

      function getLandscapeMode() {
        return new URLSearchParams(window.location.search).get('landscape') === '1';
      }

      function getViewerTitle() {
        return new URLSearchParams(window.location.search).get('title') || 'Media Viewer';
      }

      function applyViewerTitle() {
        const title = getViewerTitle();
        document.title = title;
        if (titleEl) titleEl.textContent = title;
      }

      function setRotation(node, rotation) {
        if (!node || node.tagName !== 'IMG') return;
        currentRotation = normalizeRotation(rotation);
        node.style.transform = 'rotate(' + currentRotation + 'deg)';
        node.classList.toggle('quarter-turn', currentRotation === 90 || currentRotation === 270);
      }

      function setRotateUi(isImage) {
        if (!rotateBtn) return;
        rotateBtn.hidden = !isImage;
        rotateBtn.disabled = !isImage;
      }

      function getAutoLandscapeRotation(node, requestedLandscape) {
        if (!requestedLandscape || !node || node.tagName !== 'IMG') return 0;
        return node.naturalHeight > node.naturalWidth ? 90 : 0;
      }

      async function persistRotationForSavedMedia(rotation) {
        if (!currentMediaId || !currentMediaRecord) return;
        try {
          const db = await openDb();
          await new Promise(function (resolve, reject) {
            const tx = db.transaction(MEDIA_STORE, 'readwrite');
            const store = tx.objectStore(MEDIA_STORE);
            const updated = Object.assign({}, currentMediaRecord, { rotation: normalizeRotation(rotation) });
            const request = store.put(updated);
            request.onsuccess = function () {
              currentMediaRecord = updated;
              resolve();
            };
            request.onerror = function () { reject(request.error); };
          });
        } catch (err) {
          console.error(err);
        }
      }

      function persistRotationForTempMedia(rotation) {
        if (!currentTempKey) return;
        try {
          const raw = sessionStorage.getItem(currentTempKey);
          if (!raw) return;
          const item = JSON.parse(raw);
          item.rotation = normalizeRotation(rotation);
          sessionStorage.setItem(currentTempKey, JSON.stringify(item));
        } catch (err) {
          console.error(err);
        }
      }

      function applyInitialRotation(node, requestedLandscape, explicitRotation) {
        if (!node || node.tagName !== 'IMG') {
          setRotateUi(false);
          return;
        }
        setRotateUi(true);
        const onReady = function () {
          const startRotation = Number.isFinite(explicitRotation)
            ? normalizeRotation(explicitRotation)
            : getAutoLandscapeRotation(node, requestedLandscape);
          setRotation(node, startRotation);
        };
        if (node.complete) onReady();
        else node.addEventListener('load', onReady, { once: true });
      }

      function openDb() {
        return new Promise(function (resolve, reject) {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onsuccess = function () { resolve(request.result); };
          request.onerror = function () { reject(request.error); };
        });
      }

      async function getMediaRecordById(mediaId) {
        const db = await openDb();
        return new Promise(function (resolve, reject) {
          const tx = db.transaction(MEDIA_STORE, 'readonly');
          const store = tx.objectStore(MEDIA_STORE);
          const request = store.get(mediaId);
          request.onsuccess = function () { resolve(request.result || null); };
          request.onerror = function () { reject(request.error); };
        });
      }

      function wireButtons() {
        if (rotateBtn) {
          rotateBtn.addEventListener('click', async function () {
            if (!currentMediaNode || currentMediaNode.tagName !== 'IMG') return;
            const nextRotation = normalizeRotation(currentRotation + 90);
            setRotation(currentMediaNode, nextRotation);
            persistRotationForTempMedia(nextRotation);
            await persistRotationForSavedMedia(nextRotation);
          });
        }
        if (backBtn) {
          backBtn.addEventListener('click', function () {
            history.back();
          });
        }
      }

      async function load() {
        applyViewerTitle();
        wireButtons();
        const requestedLandscape = getLandscapeMode();
        const tempKey = getTempKey();
        currentTempKey = tempKey;
        if (tempKey) {
          try {
            const raw = sessionStorage.getItem(tempKey);
            if (!raw) {
              viewer.innerHTML = '<div class="empty">This temporary media preview is no longer available.</div>';
              return;
            }
            const item = JSON.parse(raw);
            if (item.title && titleEl) { titleEl.textContent = item.title; document.title = item.title; }
            let mediaNode;
            if ((item.type || '').startsWith('video/')) {
              mediaNode = document.createElement('video');
              mediaNode.src = item.dataUrl;
              mediaNode.controls = true;
              mediaNode.autoplay = true;
              mediaNode.playsInline = true;
            } else {
              mediaNode = document.createElement('img');
              mediaNode.src = item.dataUrl;
              mediaNode.alt = item.description || 'Media preview';
            }
            viewer.innerHTML = '';
            viewer.appendChild(mediaNode);
            currentMediaNode = mediaNode;
            applyInitialRotation(mediaNode, requestedLandscape || Boolean(item.landscape), Number(item.rotation));
            if (item.description) {
              noteEl.textContent = item.description;
              noteEl.hidden = false;
            }
            return;
          } catch (err) {
            console.error(err);
            viewer.innerHTML = '<div class="empty">Could not load this temporary media preview.</div>';
            return;
          }
        }

        const mediaId = getMediaId();
        currentMediaId = mediaId;
        if (!mediaId) {
          viewer.innerHTML = '<div class="empty">No media selected.</div>';
          return;
        }

        try {
          const item = await getMediaRecordById(mediaId);
          currentMediaRecord = item;
          if (!item || !item.blob) {
            viewer.innerHTML = '<div class="empty">This media item could not be found on this device.</div>';
            return;
          }

          const objectUrl = URL.createObjectURL(item.blob);
          let mediaNode;
          if ((item.type || '').startsWith('video/')) {
            mediaNode = document.createElement('video');
            mediaNode.src = objectUrl;
            mediaNode.controls = true;
            mediaNode.autoplay = true;
            mediaNode.playsInline = true;
          } else {
            mediaNode = document.createElement('img');
            mediaNode.src = objectUrl;
            mediaNode.alt = item.description || 'Media preview';
          }

          viewer.innerHTML = '';
          viewer.appendChild(mediaNode);
          currentMediaNode = mediaNode;
          const explicitRotation = Number.isFinite(Number(item.rotation)) ? Number(item.rotation) : NaN;
          applyInitialRotation(mediaNode, requestedLandscape, explicitRotation);

          if (item.description) {
            noteEl.textContent = item.description;
            noteEl.hidden = false;
          }
        } catch (err) {
          console.error(err);
          viewer.innerHTML = '<div class="empty">Could not load this media item.</div>';
        }
      }

      load();
    }());
  </script>
</body>
</html>
